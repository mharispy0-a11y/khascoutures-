[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; frame-src https://www.google.com https://challenges.cloudflare.com; img-src 'self' data: blob: https://*.cloudinary.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;"

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TURBOPACK = "0"

[[plugins]]
  package = "@netlify/plugin-nextjs"
